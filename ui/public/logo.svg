<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="arm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#30363d"/>
      <stop offset="100%" stop-color="#f0883e"/>
    </linearGradient>
    <radialGradient id="hub" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff9f5e"/>
      <stop offset="100%" stop-color="#f0883e"/>
    </radialGradient>
    <radialGradient id="sat" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff9f5e"/>
      <stop offset="100%" stop-color="#f0883e"/>
    </radialGradient>
  </defs>

  <!-- Subtle outer orbit ring -->
  <circle cx="256" cy="256" r="232" fill="none" stroke="#21262d" stroke-width="6"/>

  <!-- Connection arms -->
  <line x1="256" y1="256" x2="256" y2="108" stroke="url(#arm)" stroke-width="20" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="384.18" y2="330" stroke="url(#arm)" stroke-width="20" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="127.82" y2="330" stroke="url(#arm)" stroke-width="20" stroke-linecap="round"/>

  <!-- Satellite glow rings -->
  <circle cx="256" cy="108" r="48" fill="#f0883e" opacity="0.12"/>
  <circle cx="384.18" cy="330" r="48" fill="#f0883e" opacity="0.12"/>
  <circle cx="127.82" cy="330" r="48" fill="#f0883e" opacity="0.12"/>

  <!-- Satellites -->
  <circle cx="256" cy="108" r="32" fill="url(#sat)"/>
  <circle cx="384.18" cy="330" r="32" fill="url(#sat)"/>
  <circle cx="127.82" cy="330" r="32" fill="url(#sat)"/>

  <!-- Satellite inner highlights -->
  <circle cx="264" cy="100" r="10" fill="#ffffff" opacity="0.35"/>
  <circle cx="392.18" cy="322" r="10" fill="#ffffff" opacity="0.35"/>
  <circle cx="135.82" cy="322" r="10" fill="#ffffff" opacity="0.35"/>

  <!-- Central hub outer ring -->
  <circle cx="256" cy="256" r="68" fill="#f0883e" opacity="0.10"/>
  <circle cx="256" cy="256" r="56" fill="#24292f"/>

  <!-- Central hub -->
  <circle cx="256" cy="256" r="48" fill="url(#hub)"/>

  <!-- Central hub highlight -->
  <circle cx="268" cy="244" r="14" fill="#ffffff" opacity="0.30"/>
</svg>