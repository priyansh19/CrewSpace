<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <style>
    .node { fill: #18181b; }
    .edge { stroke: #18181b; }
    @media (prefers-color-scheme: dark) {
      .node { fill: #e4e4e7; }
      .edge { stroke: #e4e4e7; }
    }
  </style>
  <!-- Triangle edges -->
  <line class="edge" x1="12" y1="3.5" x2="20.5" y2="18" stroke-width="1.5" stroke-linecap="round"/>
  <line class="edge" x1="12" y1="3.5" x2="3.5" y2="18" stroke-width="1.5" stroke-linecap="round"/>
  <line class="edge" x1="3.5" y1="18" x2="20.5" y2="18" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Nodes -->
  <circle class="node" cx="12" cy="3.5" r="2.5"/>
  <circle class="node" cx="20.5" cy="18" r="2.5"/>
  <circle class="node" cx="3.5" cy="18" r="2.5"/>
</svg>
