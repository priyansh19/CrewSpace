apiVersion: apps/v1
kind: Deployment
metadata:
  name: crewspace
  namespace: crewspace
  labels:
    app: crewspace
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: crewspace
  template:
    metadata:
      labels:
        app: crewspace
    spec:
      containers:
        - name: crewspace
          image: ghcr.io/priyansh19/crewspace:latest
          ports:
            - containerPort: 3100
              name: http
          envFrom:
            - configMapRef:
                name: crewspace-config
          env:
            - name: CREWSPACE_PUBLIC_URL
              value: "https://REPLACE_ME"
          envFrom:
            - secretRef:
                name: crewspace-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3100
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3100
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
