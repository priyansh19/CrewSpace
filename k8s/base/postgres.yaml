apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: crewspace-db
  namespace: crewspace
spec:
  serviceName: crewspace-db
  replicas: 1
  selector:
    matchLabels:
      app: crewspace-db
  template:
    metadata:
      labels:
        app: crewspace-db
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              value: "crewspace"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: crewspace-db-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: "crewspace"
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - crewspace
                - -d
                - crewspace
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - crewspace
                - -d
                - crewspace
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: crewspace-db
  namespace: crewspace
spec:
  selector:
    app: crewspace-db
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  type: ClusterIP
