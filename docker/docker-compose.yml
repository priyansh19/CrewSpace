services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: crewspace
      POSTGRES_PASSWORD: crewspace
      POSTGRES_DB: crewspace
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crewspace -d crewspace"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://crewspace:crewspace@db:5432/crewspace
      PORT: "3100"
      SERVE_UI: "true"
      CREWSPACE_DEPLOYMENT_MODE: "authenticated"
      CREWSPACE_DEPLOYMENT_EXPOSURE: "private"
      CREWSPACE_PUBLIC_URL: "${CREWSPACE_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
      CREWSPACE_AGENT_JWT_SECRET: "${CREWSPACE_AGENT_JWT_SECRET}"
      # Uncomment to connect agents to a locally running LM Studio instance.
      # host.docker.internal resolves to the host machine from inside the container.
      # LM_STUDIO_URL: "http://host.docker.internal:1234"
    # Ensures host.docker.internal resolves on Linux (Docker Desktop handles this automatically).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - crewspace-data:/crewspace
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  crewspace-data:
