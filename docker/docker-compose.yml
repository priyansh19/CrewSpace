services:
  db:
    image: postgres:17-alpine
    container_name: crewspace-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: crewspace
      POSTGRES_PASSWORD: crewspace
      POSTGRES_DB: crewspace
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crewspace -d crewspace"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: crewspace
    restart: unless-stopped
    ports:
      - "3100:3100"
    environment:
      PORT: "3100"
      SERVE_UI: "true"
      CREWSPACE_DEPLOYMENT_MODE: "authenticated"
      CREWSPACE_DEPLOYMENT_EXPOSURE: "private"
      CREWSPACE_PUBLIC_URL: "${CREWSPACE_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
      CREWSPACE_AGENT_JWT_SECRET: "${CREWSPACE_AGENT_JWT_SECRET}"
      DATABASE_URL: "postgres://crewspace:crewspace@db:5432/crewspace"
    volumes:
      - crewspace-data:/crewspace
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  pgdata:
  crewspace-data:
